name: Setup build dependencies
description: Install SCons and the platform packages needed to build the extension.

inputs:
  compiler:
    description: >
      Linux compiler toolchain package to install: "gcc" (build-essential)
      or "clang". Ignored on macOS/Windows.
    required: false
    default: gcc

runs:
  using: composite
  steps:
    - name: Install dependencies (Linux)
      if: runner.os == 'Linux'
      shell: bash
      run: |
        sudo apt-get update -qq
        sudo apt-get install -y -qq \
          ${{ inputs.compiler == 'clang' && 'clang' || 'build-essential' }} \
          scons \
          pkg-config \
          libx11-dev \
          libxcursor-dev \
          libxinerama-dev \
          libgl1-mesa-dev \
          libxrandr-dev \
          libxi-dev \
          libxkbcommon-dev

    - name: Install dependencies (macOS)
      if: runner.os == 'macOS'
      shell: bash
      run: brew install scons

    - name: Install dependencies (Windows)
      if: runner.os == 'Windows'
      # Composite-action run steps must declare a shell explicitly (they
      # don't inherit the calling workflow's `defaults.run.shell`); pwsh
      # matches windows-latest's own default, which the original inline
      # steps relied on implicitly.
      #
      # scons via choco is unreliable (the community feed has dropped or
      # flagged the package before); pip against the runner's preinstalled
      # Python is the same approach godot-cpp's own CI uses.
      shell: pwsh
      run: python -m pip install scons
