name: Build

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

jobs:
  build:
    strategy:
      fail-fast: false
      matrix:
        target:
          - template_debug
          - template_release
        platform:
          - { os: macos-latest,     name: macos,   arch: "" }
          - { os: ubuntu-latest,    name: linux,   arch: x86_64 }
          - { os: ubuntu-26.04-arm, name: linux,   arch: arm64 }
          - { os: windows-latest,   name: windows, arch: x86_64 }
          - { os: windows-latest,   name: windows, arch: arm64 }

    runs-on: ${{ matrix.os }}
    name: Build (${{ matrix.platform.name }}${{ matrix.platform.arch != '' && format('-{0}', matrix.platform.arch) || '' }}, ${{ matrix.target }})

    defaults:
      run:
        shell: bash

    steps:
      - uses: actions/checkout@v4
        with:
          submodules: recursive

      - uses: ./.github/actions/setup-deps

      - name: Build (${{ matrix.target }})
        run: scons target=${{ matrix.target }} arch=${{ matrix.platform.arch }}

      - name: Upload artifacts
        uses: actions/upload-artifact@v4
        with:
          name: hap-video-${{ matrix.platform.name }}${{ matrix.platform.arch != '' && format('-{0}', matrix.platform.arch) || '' }}-${{ matrix.target }}
          path: addons/hap_video/

  core_tests:
    strategy:
      fail-fast: false
      matrix:
        include:
          - { os: macos-latest,     platform: macos,   arch: "" }
          - { os: ubuntu-latest,    platform: linux,   arch: x86_64 }
          - { os: ubuntu-26.04-arm, platform: linux,   arch: arm64 }
          - { os: windows-latest,   platform: windows, arch: x86_64 }
          - { os: windows-latest,   platform: windows, arch: arm64 }

    runs-on: ${{ matrix.os }}
    name: Core tests (${{ matrix.platform }}${{ matrix.arch != '' && format('-{0}', matrix.arch) || '' }})

    defaults:
      run:
        shell: bash

    steps:
      - uses: actions/checkout@v4
        with:
          submodules: recursive

      - uses: ./.github/actions/setup-deps

      - name: Build core tests
        run: scons build_tests=1 target=template_debug

      - name: Run core tests
        run: scripts/run_core_tests.sh test_demuxer test_decoder test_concurrency test_scheduler test_fuzz_regressions
