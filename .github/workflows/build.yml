name: Build

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

jobs:
  build:
    strategy:
      fail-fast: false
      matrix:
        os: [macos-latest, windows-latest, ubuntu-latest]
        target: [template_debug, template_release]

    runs-on: ${{ matrix.os }}

    defaults:
      run:
        shell: bash

    steps:
      - uses: actions/checkout@v4
        with:
          submodules: recursive

      - uses: ./.github/actions/setup-deps

      - name: Build (${{ matrix.target }})
        run: scons target=${{ matrix.target }}

      - name: Upload artifacts
        uses: actions/upload-artifact@v4
        with:
          name: hap-video-${{ matrix.os }}-${{ matrix.target }}
          path: addons/hap_video/

  core_tests:
    strategy:
      fail-fast: false
      matrix:
        os: [macos-latest, windows-latest, ubuntu-latest]

    runs-on: ${{ matrix.os }}

    defaults:
      run:
        shell: bash

    steps:
      - uses: actions/checkout@v4
        with:
          submodules: recursive

      - uses: ./.github/actions/setup-deps

      - name: Build core tests
        run: scons build_tests=1 target=template_debug

      - name: Run core tests
        run: scripts/run_core_tests.sh test_demuxer test_decoder test_concurrency test_scheduler test_fuzz_regressions
