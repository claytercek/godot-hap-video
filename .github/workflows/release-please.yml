name: Release Please

# When release-please cuts a release, builds debug + release binaries for
# macOS (universal), and Linux/Windows (x86_64 + arm64), assembles the
# self-contained addon directory (binaries, .gdextension manifest,
# licenses), and attaches the packaged zip to the release.
#
# The release+build jobs live in this workflow (rather than being
# triggered by the `release: published` event) because release-please
# publishes using the default GITHUB_TOKEN, and GitHub Actions does not
# let events generated by that token trigger other workflows.

on:
  push:
    branches: [main]

permissions:
  contents: write
  pull-requests: write

jobs:
  release-please:
    runs-on: ubuntu-latest
    outputs:
      release_created: ${{ steps.release.outputs.release_created }}
      tag_name: ${{ steps.release.outputs.tag_name }}
    steps:
      - uses: googleapis/release-please-action@v4
        id: release
        with:
          config-file: release-please-config.json
          manifest-file: .release-please-manifest.json

  build:
    needs: release-please
    if: needs.release-please.outputs.release_created == 'true'
    strategy:
      fail-fast: true
      matrix:
        include:
          - { os: macos-latest,     platform: macos,   arch: "" }
          - { os: ubuntu-latest,    platform: linux,   arch: x86_64 }
          - { os: ubuntu-24.04-arm, platform: linux,   arch: arm64 }
          - { os: windows-latest,   platform: windows, arch: x86_64 }
          - { os: windows-11-arm,   platform: windows, arch: arm64 }

    runs-on: ${{ matrix.os }}
    name: Build (${{ matrix.platform }}${{ matrix.arch != '' && format('-{0}', matrix.arch) || '' }})

    defaults:
      run:
        shell: bash

    steps:
      - uses: actions/checkout@v4
        with:
          submodules: recursive

      - uses: ./.github/actions/setup-deps

      - name: Build (template_debug)
        run: scons target=template_debug arch=${{ matrix.arch }}

      - name: Build (template_release)
        run: scons target=template_release arch=${{ matrix.arch }}

      - name: Upload addon artifact
        uses: actions/upload-artifact@v4
        with:
          name: addon-${{ matrix.platform }}${{ matrix.arch != '' && format('-{0}', matrix.arch) || '' }}
          path: addons/hap_video/
          if-no-files-found: error

  package:
    needs: [release-please, build]
    runs-on: ubuntu-latest

    steps:
      - name: Download platform artifacts
        uses: actions/download-artifact@v4
        with:
          # Each platform artifact contains the same manifest/licenses
          # plus its own platform/ binary subdirectory; merging yields
          # the complete addon.
          pattern: addon-*
          path: package/addons/hap_video/
          merge-multiple: true

      - name: Verify addon completeness
        run: |
          cd package/addons/hap_video
          for f in \
            hap_video.gdextension \
            LICENSE.md \
            licenses/LICENSE-hap.txt \
            licenses/LICENSE-snappy.txt \
            licenses/LICENSE-minimp4.txt \
            licenses/LICENSE-godot-cpp.txt \
            macos/libhap_video.macos.template_debug.dylib \
            macos/libhap_video.macos.template_release.dylib \
            windows/libhap_video.windows.template_debug.x86_64.dll \
            windows/libhap_video.windows.template_release.x86_64.dll \
            windows/libhap_video.windows.template_debug.arm64.dll \
            windows/libhap_video.windows.template_release.arm64.dll \
            linux/libhap_video.linux.template_debug.x86_64.so \
            linux/libhap_video.linux.template_release.x86_64.so \
            linux/libhap_video.linux.template_debug.arm64.so \
            linux/libhap_video.linux.template_release.arm64.so
          do
            [ -f "$f" ] || { echo "missing: $f"; exit 1; }
          done

      - name: Create addon zip
        env:
          TAG: ${{ needs.release-please.outputs.tag_name }}
        run: |
          cd package
          zip -r "../hap-video-${TAG}.zip" addons

      - name: Attach zip to release
        env:
          GH_TOKEN: ${{ github.token }}
          TAG: ${{ needs.release-please.outputs.tag_name }}
        run: |
          gh release upload "$TAG" "hap-video-${TAG}.zip" \
            --repo "${{ github.repository }}"
