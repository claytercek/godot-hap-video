name: Sanitizers

# MemorySanitizer is intentionally not run: it requires an instrumented
# libc++/libc (and ideally an instrumented Godot/godot-cpp) to avoid false
# positives from uninstrumented dependencies, which isn't set up here. Not
# in scope for this workflow.
#
# oss-fuzz integration is a recorded future option, not implemented here;
# fuzzing today is local-only via scripts/fuzz_demuxer.sh.

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

jobs:
  asan_ubsan:
    runs-on: ubuntu-latest

    defaults:
      run:
        shell: bash

    steps:
      - uses: actions/checkout@v4
        with:
          submodules: recursive

      - uses: ./.github/actions/setup-deps
        with:
          compiler: clang

      - name: Build (ASan+UBSan)
        run: scons build_tests=1 sanitize=asan_ubsan use_llvm=yes target=template_debug

      - name: Run core tests (ASan+UBSan)
        run: scripts/run_core_tests.sh test_demuxer test_decoder test_concurrency test_scheduler test_fuzz_regressions
        env:
          ASAN_OPTIONS: detect_leaks=1

  tsan:
    runs-on: ubuntu-latest

    defaults:
      run:
        shell: bash

    steps:
      - uses: actions/checkout@v4
        with:
          submodules: recursive

      - uses: ./.github/actions/setup-deps
        with:
          compiler: clang

      - name: Build (TSan)
        run: scons build_tests=1 sanitize=tsan use_llvm=yes target=template_debug

      - name: Run core tests (TSan)
        run: scripts/run_core_tests.sh test_concurrency test_scheduler test_decoder
        env:
          TSAN_OPTIONS: halt_on_error=1
