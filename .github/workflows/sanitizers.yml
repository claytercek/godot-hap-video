name: Sanitizers

# Sanitizer / safety-check lanes for the core test suite (`zig build test`),
# run on every PR and nightly. Two lanes, two
# different guarantees:
#
#   - debug_safety: `-Dtest-optimize=Debug` turns on Zig's own runtime safety
#     checks (bounds, overflow, etc.) for the core Zig code.
#   - ubsan: `-Dtest-optimize=Debug -Dsanitize-c=full` layers
#     UndefinedBehaviorSanitizer onto the vendored C/C++ the core links
#     against (hap, minimp4, snappy).
# No AddressSanitizer or ThreadSanitizer lane exists in this file.

on:
  pull_request:
    branches: [main]
  schedule:
    - cron: "0 6 * * *"
  workflow_dispatch:

jobs:
  sanitize:
    name: ${{ matrix.lane.name }}
    runs-on: ubuntu-latest
    strategy:
      matrix:
        lane:
          - name: Debug safety checks
            flags: -Dtest-optimize=Debug
          - name: UBSan
            flags: -Dtest-optimize=Debug -Dsanitize-c=full

    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          submodules: recursive

      - name: Setup Zig
        uses: mlugg/setup-zig@v2
        with:
          version: 0.16.0

      - name: Run core tests
        run: zig build test ${{ matrix.lane.flags }} --summary all
