name: Sanitizers

# MemorySanitizer is intentionally not run: it requires an instrumented
# libc++/libc (and ideally an instrumented Godot/godot-cpp) to avoid false
# positives from uninstrumented dependencies, which isn't set up here. Not
# in scope for this workflow.
#
# oss-fuzz integration is a recorded future option, not implemented here;
# fuzzing today is local-only via scripts/fuzz_demuxer.sh.

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]
  schedule:
    # Nightly at 07:00 UTC.
    - cron: "0 7 * * *"

jobs:
  asan_ubsan:
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v4
        with:
          submodules: recursive

      - name: Install dependencies
        run: |
          sudo apt-get update -qq
          sudo apt-get install -y -qq \
            clang \
            scons \
            pkg-config \
            libx11-dev \
            libxcursor-dev \
            libxinerama-dev \
            libgl1-mesa-dev \
            libxrandr-dev \
            libxi-dev \
            libxkbcommon-dev

      - name: Build (ASan+UBSan)
        run: scons build_tests=1 sanitize=asan_ubsan use_llvm=yes target=template_debug
        shell: bash

      - name: Run demuxer tests
        run: build/tests/test_demuxer
        shell: bash
        env:
          ASAN_OPTIONS: detect_leaks=1

      - name: Run decoder tests
        run: build/tests/test_decoder
        shell: bash
        env:
          ASAN_OPTIONS: detect_leaks=1

      - name: Run concurrency tests
        run: build/tests/test_concurrency
        shell: bash
        env:
          ASAN_OPTIONS: detect_leaks=1

      - name: Run scheduler tests
        run: build/tests/test_scheduler
        shell: bash
        env:
          ASAN_OPTIONS: detect_leaks=1

      - name: Run fuzz regression tests
        run: build/tests/test_fuzz_regressions
        shell: bash
        env:
          ASAN_OPTIONS: detect_leaks=1

  tsan:
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v4
        with:
          submodules: recursive

      - name: Install dependencies
        run: |
          sudo apt-get update -qq
          sudo apt-get install -y -qq \
            clang \
            scons \
            pkg-config \
            libx11-dev \
            libxcursor-dev \
            libxinerama-dev \
            libgl1-mesa-dev \
            libxrandr-dev \
            libxi-dev \
            libxkbcommon-dev

      - name: Build (TSan)
        run: scons build_tests=1 sanitize=tsan use_llvm=yes target=template_debug
        shell: bash

      - name: Run concurrency tests
        run: build/tests/test_concurrency
        shell: bash
        env:
          TSAN_OPTIONS: halt_on_error=1

      - name: Run scheduler tests
        run: build/tests/test_scheduler
        shell: bash
        env:
          TSAN_OPTIONS: halt_on_error=1

      - name: Run decoder tests
        run: build/tests/test_decoder
        shell: bash
        env:
          TSAN_OPTIONS: halt_on_error=1
